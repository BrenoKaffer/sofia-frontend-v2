<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="320" viewBox="0 0 1024 320" fill="none">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B6FF6A" />
      <stop offset="0.5" stop-color="#19FF7A" />
      <stop offset="1" stop-color="#00D4FF" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="text" x1="220" y1="120" x2="920" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5FFF5" />
      <stop offset="0.55" stop-color="#B6FF6A" />
      <stop offset="1" stop-color="#1BFF78" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%" filterUnits="objectBoundingBox">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feColorMatrix
        in="blur"
        type="matrix"
        values="
          0 0 0 0 0.20
          0 0 0 0 1.00
          0 0 0 0 0.45
          0 0 0 0.85 0"
        result="greenGlow"
      />
      <feMerge>
        <feMergeNode in="greenGlow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%" filterUnits="objectBoundingBox">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feColorMatrix
        in="blur"
        type="matrix"
        values="
          0 0 0 0 0.08
          0 0 0 0 0.90
          0 0 0 0 0.35
          0 0 0 0.65 0"
        result="greenGlow"
      />
      <feMerge>
        <feMergeNode in="greenGlow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="spark" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(90) scale(14)">
      <stop offset="0" stop-color="#7CFF5A" stop-opacity="0.9" />
      <stop offset="1" stop-color="#7CFF5A" stop-opacity="0" />
    </radialGradient>
  </defs>

  <g opacity="0.65" filter="url(#softGlow)">
    <circle cx="180" cy="110" r="1.6" fill="url(#spark)" transform="translate(0 0)" />
    <circle cx="290" cy="88" r="1.6" fill="url(#spark)" transform="translate(0 0)" />
    <circle cx="420" cy="132" r="1.6" fill="url(#spark)" transform="translate(0 0)" />
    <circle cx="520" cy="92" r="1.6" fill="url(#spark)" transform="translate(0 0)" />
    <circle cx="640" cy="140" r="1.6" fill="url(#spark)" transform="translate(0 0)" />
    <circle cx="780" cy="108" r="1.6" fill="url(#spark)" transform="translate(0 0)" />
    <circle cx="900" cy="150" r="1.6" fill="url(#spark)" transform="translate(0 0)" />
  </g>

  <g filter="url(#glow)">
    <g transform="translate(64 78)">
      <circle cx="80" cy="80" r="70" fill="none" stroke="url(#ring)" stroke-width="16" />
      <circle cx="80" cy="80" r="44" fill="none" stroke="#DFFFE0" stroke-opacity="0.95" stroke-width="10" />
      <circle cx="80" cy="80" r="20" fill="#1BFF78" fill-opacity="0.9" />
      <path d="M80 18 L80 142" stroke="#CFFFD6" stroke-opacity="0.7" stroke-width="3" />
      <path d="M18 80 L142 80" stroke="#CFFFD6" stroke-opacity="0.7" stroke-width="3" />
      <g transform="translate(110 35) rotate(18)">
        <path d="M0 0 L38 20" stroke="#B6FF6A" stroke-width="10" stroke-linecap="round" />
        <path d="M40 20 L54 10 L52 32 Z" fill="#B6FF6A" />
      </g>
    </g>

    <g>
      <text
        x="220"
        y="190"
        fill="url(#text)"
        font-family="Poppins, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-size="86"
        font-weight="800"
        letter-spacing="-1.2"
      >
        NoAlvo<tspan fill="#1BFF78">Class</tspan>
      </text>
    </g>
  </g>
</svg>
